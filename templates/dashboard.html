<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial;
    background:#f2f2f2;
}

.container{
    width:1200px;
    margin:auto;
    text-align:center;
}

h1{
    color:white;
    margin-top:30px;
}

.cards{
    display:flex;
    justify-content:space-between;
    margin-top:40px;
}

.card{
    width:160px;
    height:110px;
    border:2px solid #333;
    border-radius:8px;
    background:white;
    box-shadow:2px 2px 5px gray;
}

.card h3{
    margin-top:15px;
    font-size:20px;
}

}

.buttons{
    margin-top:40px;
}

button{
    width:200px;
    height:45px;
    font-size:18px;
    background:blck;
    color:black;
    border:none;
    border-radius:5px;
    margin:10px;
}

button:hover{
    background:#black;
}

</style>

</head>

<body>

<div class="container">

<h1>STUDENT DASHBOARD</h1>

<div class="cards">

<div class="card">
<h3>Total Feedback</h3>
<h2>{{ total }}</h2>
</div>

<div class="card">
<h3>5 ★ Rating</h3>
<h2>{{ five }}</h2>
</div>

<div class="card">
<h3>4 ★ Rating</h3>
<h2>{{ four }}</h2>
</div>

<div class="card">
<h3>3 ★ Rating</h3>
<h2>{{ three }}</h2>
</div>

<div class="card">
<h3>2 ★ Rating</h3>
<h2>{{ two }}</h2>
</div>

<div class="card">
<h3>1 ★ Rating</h3>
<h2>{{ one }}</h2>
</div>

</div>

<div class="buttons">

<h2>Student Feedback Management System</h2>

<a href="{{ url_for('feedback') }}">
<button>Student Feedback Form</button>
</a>

<a href="{{ url_for('view_feedback') }}">
<button>View Feedback</button>
</a>

<a href="{{ url_for('collegeform') }}">
<button>College Form</button>
</a>

<a href="{{ url_for('collegeview') }}">
<button>College View</button>
</a>

<a href="{{ url_for('logout') }}">
<button>Logout</button>
</a>

</div>

</div>

</body>
</html>
