<!DOCTYPE html>
<html>
<head>
<title>Student Dashboard</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f2f2f2;
}

.container{
    width:1100px;
    margin:30px auto;
}

h1{
    text-align:center;
}

.row{
    display:flex;
    justify-content:space-between;
    margin-top:20px;
}

.card{
    width:160px;
    height:120px;
    background:white;
    border:2px solid black;
    text-align:center;
    padding-top:15px;
}

.card h3{
    margin:0;
}

.card h2{
    color:blue;
}

.button-box{
    margin-top:30px;
    text-align:center;
}

button{
    width:220px;
    height:45px;
    font-size:18px;
    margin:10px;
    background:#0066cc;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#004080;
}

table{
    width:100%;
    margin-top:30px;
    border-collapse:collapse;
    background:white;
}

table,th,td{
    border:1px solid black;
}

th{
    background:#0066cc;
    color:white;
}

th,td{
    padding:10px;
    text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h1>Student Dashboard</h1>

<div class="row">

<div class="card">
<h3>Total Feedback</h3>
<h2>{{ total }}</h2>
</div>

<div class="card">
<h3>5 Star</h3>
<h2>{{ five }}</h2>
</div>

<div class="card">
<h3>4 Star</h3>
<h2>{{ four }}</h2>
</div>

<div class="card">
<h3>3 Star</h3>
<h2>{{ three }}</h2>
</div>

<div class="card">
<h3>2 Star</h3>
<h2>{{ two }}</h2>
</div>

<div class="card">
<h3>1 Star</h3>
<h2>{{ one }}</h2>
</div>

</div>

<div class="button-box">

<a href="/feedback">
<button>Student Feedback Form</button>
</a>

<a href="/">
<button>Logout</button>
</a>

</div>

</body>
</html>
