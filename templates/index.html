<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>

    <style>

        body{
            margin:0;
            background-color:lightgray;
            font-family:Arial;
        }

        .container{
            width:400px;
            height:500px;
            margin:50px auto;
            border:2px solid black;
            background-color:white;
        }

        .header{
            height:60px;
            border-bottom:2px solid black;
            text-align:center;
	    padding:15px;
        }

        .content{
            padding:50px;
            text-align:center;
        }

        label{
            font-size:18px;
        }

        input{
            width:220px;
            height:35px;
            border:2px solid black;
            border-radius:5px;
            margin-bottom:20px;
        }

        .footer{
            height:60px;
	    padding:15px;
            background-color:light;
            border-top:2px solid black;
            margin-top:90px;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="header">
        <h2>Login Page</h2>
    </div>

    <div class="content">

        <label>User Name</label><br><br>
        <input type="text" placeholder="Enter User Name"><br>

        <label>Password</label><br><br>
        <input type="password" placeholder="Enter Password">

    </div>

    <div class="footer">
       
    </div>

</div>

</body>
</html>
