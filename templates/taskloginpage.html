<!DOCTYPE html>
<html>
<head>
<title>Feedback Form</title>

<style>

body{
    font-family:Arial;
    background:#f2f2f2;
}

.container{
    width:500px;
    margin:40px auto;
    border:2px solid black;
    padding:20px;
    background:white;
}

h2{
    text-align:center;
}

table{
    width:100%;
}

td{
    padding:10px;
}

input,select,textarea{
    width:100%;
    padding:8px;
    box-sizing:border-box;
}

textarea{
    height:80px;
}

button{
    width:100%;
    padding:10px;
    background:#007BFF;
    color:white;
    border:none;
    cursor:pointer;
    font-size:16px;
}

</style>

</head>

<body>

<div class="container">

<h2>Student Feedback Form</h2>

<form>

<table>

<tr>
<td>Student Name</td>
<td><input type="text" name="studentname"></td>
</tr>

<tr>
<td>Year</td>
<td>
<select name="year">
<option>First Year</option>
<option>Second Year</option>
<option>Third Year</option>
<option>Final Year</option>
</select>
</td>
</tr>

<tr>
<td>College</td>
<td><input type="text" name="college"></td>
</tr>

<tr>
<td>Date of Birth</td>
<td><input type="date" name="dob"></td>
</tr>

<tr>
<td>Gender</td>
<td>
<input type="radio" name="gender" value="Male"> Male
<input type="radio" name="gender" value="Female"> Female
</td>
</tr>

<tr>
<td>Address</td>
<td><textarea name="address"></textarea></td>
</tr>

<tr>
<td>Rating</td>
<td>
<select name="rating">
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
</select>
</td>
</tr>

<tr>
<td>Remark</td>
<td><textarea name="remark"></textarea></td>
</tr>

<tr>
<td colspan="2">
<button type="submit">Submit Feedback</button>
</td>
</tr>

</table>

</form>

</div>

</body>
</html>
