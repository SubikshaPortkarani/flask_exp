<!DOCTYPE html>
<html>
<head>

<title>ViewFeedback</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
}

table{
width:95%;
margin:auto;
border-collapse:collapse;
}

th{

color:white;
padding:10px;
}

td{
padding:10px;
text-align:center;
border:1px solid gray;
}

h1{
text-align:center;
}

button{
padding:10px 20px;
background:#007bff;
color:white;
border:none;
margin:10px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Student Feedback Details</h1>

<center>

<a href="/dashboard">
<button>Dashboard</button>
</a>

<a href="/feedback">
<button>New Feedback</button>
</a>

</center>

<table>

<tr>

<th>ID</th>
<th>Student Name</th>
<th>Year</th>
<th>College</th>
<th>DOB</th>
<th>Gender</th>
<th>Email_id</th>
<th>Address</th>
<th>Rating</th>
<th>Remark</th>

</tr>

{% for row in data %}

<tr>

<td>{{row[0]}}</td>
<td>{{row[1]}}</td>
<td>{{row[2]}}</td>
<td>{{row[3]}}</td>
<td>{{row[4]}}</td>
<td>{{row[5]}}</td>
<td>{{row[6]}}</td>
<td>{{row[7]}}</td>
<td>{{row[8]}}</td>
<td>{{row[9]}}</td>


</tr>

{% endfor %}

</table>

</body>
</html>
