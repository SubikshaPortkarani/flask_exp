<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Arial;
            background:#f2f2f2;
        }

        .login-box{
            width:350px;
            margin:100px auto;
            padding:30px;
            border:2px solid black;
            background:white;
            border-radius:10px;
        }

        h2{
            text-align:center;
        }

        label{
            font-weight:bold;
        }

        input{
            width:100%;
            height:35px;
            margin-top:5px;
            margin-bottom:15px;
            padding-left:10px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            height:40px;
            background:blue;
            color:white;
            border:none;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:darkblue;
        }

    </style>

</head>

<body>

<div class="login-box">

<h2>Student Feedback Login</h2>

<form action="/dashboard" method="get">

<label>Username</label>

<input type="text" name="username" placeholder="Enter Username" required>

<label>Password</label>

<input type="password" name="password" placeholder="Enter Password" required>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
